<!DOCTYPE html>
<html oncontextmenu="return false">
<head>
  <title>Shit Box</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" type="image/x-icon" href="pics/skull.jpg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--SCRIPTS-->
  <script>
    /*Form Script*/
    function submitForm() {
    var comment = document.getElementById("comment").value;
    // Create the webhook payload
    var payload = {
      embeds: [
        {
          
          fields: [
            { name: "Comment", value: comment }
          ]
        }
      ]
    };
    // Send the payload to the Discord webhook
    var webhookUrl = "https://discord.com/api/webhooks/1190874683697021038/QYAiqFbrtK6qfdVxjG6puVF4AjMqym5XqfuWkc5_AxMtJr80CrVkfJbtPzA629fq5wEO";
    var request = new XMLHttpRequest();
    request.open("POST", webhookUrl);
    request.setRequestHeader("Content-Type", "application/json");
    request.send(JSON.stringify(payload));

    // Optionally, show a success message or redirect to a thank you page
    alert("Form submitted successfully!");
    location.reload();
  }
</script>
</head>
<body>
    <!-- Form -->
   
    <div class="panel" id="panel4">
      <form onsubmit="event.preventDefault(); submitForm();">
   
        <label for="comment">Comment:</label>
        <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
   
        <input type="submit" value="Submit">
      </form>
    </div>
</body>
</html>
